<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Талархлын Цэцэрлэг</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Arial Unicode MS', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #87ceeb 0%, #b8e4f9 30%, #d4edda 65%, #a8d5a2 100%);
      color: #1a3a1a;
    }

    /* ── Decorative ── */
    .sun { position: fixed; top: 1.2rem; right: 2rem; font-size: 2.8rem; opacity: 0.75; pointer-events: none; animation: sunPulse 5s ease-in-out infinite; }
    @keyframes sunPulse { 0%,100% { transform: scale(1) rotate(0deg); opacity: 0.65; } 50% { transform: scale(1.08) rotate(6deg); opacity: 0.85; } }
    .clouds { position: fixed; top: 0; left: 0; right: 0; height: 120px; overflow: hidden; pointer-events: none; z-index: 0; }
    .cloud  { position: absolute; font-size: 2.5rem; opacity: 0.5; animation: cloudDrift linear infinite; }
    .cloud:nth-child(1) { top: 10px; left: -60px; animation-duration: 40s; font-size: 2rem; }
    .cloud:nth-child(2) { top: 30px; left: -80px; animation-duration: 60s; animation-delay: -20s; font-size: 3rem; }
    .cloud:nth-child(3) { top: 5px;  left: -40px; animation-duration: 50s; animation-delay: -35s; font-size: 1.8rem; }
    @keyframes cloudDrift { from { transform: translateX(-120px); } to { transform: translateX(110vw); } }

    /* ── Views ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ══ AUTH VIEW ══ */
    .auth-wrap {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }
    .auth-title { text-align: center; margin-bottom: 1.8rem; }
    .auth-title h1 { font-size: 2.2rem; font-weight: 700; color: #1b4d1b; text-shadow: 0 2px 8px rgba(0,80,0,0.12); }
    .auth-title p  { margin-top: 0.4rem; font-size: 0.95rem; color: #3d7a3d; }

    .auth-card {
      width: 100%; max-width: 400px;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(14px);
      border-radius: 24px; padding: 2rem;
      box-shadow: 0 10px 40px rgba(0,80,0,0.18);
      border: 1.5px solid rgba(255,255,255,0.75);
    }
    .auth-tabs { display: flex; margin-bottom: 1.6rem; border-radius: 12px; overflow: hidden; border: 1.5px solid #c8e6c9; }
    .tab-btn { flex: 1; padding: 0.7rem; border: none; background: transparent; font-size: 0.95rem; font-family: inherit; cursor: pointer; color: #5a8a5a; transition: background 0.2s, color 0.2s; }
    .tab-btn.active { background: linear-gradient(135deg, #43a047, #1b5e20); color: #fff; font-weight: 600; }

    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.82rem; color: #3d6b3d; font-weight: 600; margin-bottom: 0.35rem; }
    .field input {
      width: 100%; padding: 0.78rem 1rem;
      border: 2px solid #c8e6c9; border-radius: 11px;
      font-size: 0.97rem; font-family: inherit;
      background: rgba(255,255,255,0.95); color: #1a3a1a;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus { border-color: #4caf50; box-shadow: 0 0 0 3px rgba(76,175,80,0.16); }
    .field input::placeholder { color: #b0c4b0; }

    .auth-btn {
      width: 100%; padding: 0.88rem; margin-top: 0.5rem;
      background: linear-gradient(135deg, #43a047, #1b5e20); color: #fff;
      border: none; border-radius: 13px; font-size: 1.05rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: transform 0.2s, box-shadow 0.2s;
    }
    .auth-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(27,94,32,0.35); }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ══ JOURNAL VIEW ══ */
    .journal-header {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 1.5rem 0.5rem;
      max-width: 900px; margin: 0 auto;
    }
    .journal-header-left h1 { font-size: 1.6rem; font-weight: 700; color: #1b4d1b; }
    .journal-header-left .garden-owner { font-size: 0.82rem; color: #5a8a5a; margin-top: 0.15rem; }
    .journal-header-right { display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap; justify-content: flex-end; }
    .streak-badge { display: inline-flex; align-items: center; gap: 0.3rem; background: linear-gradient(135deg, #ff9800, #e65100); color: #fff; padding: 0.3rem 0.85rem; border-radius: 20px; font-size: 0.82rem; font-weight: 600; box-shadow: 0 2px 8px rgba(230,81,0,0.3); }
    .logout-btn { padding: 0.38rem 0.9rem; background: rgba(255,255,255,0.7); border: 1.5px solid #c8e6c9; border-radius: 20px; font-size: 0.82rem; cursor: pointer; color: #3d6b3d; font-family: inherit; backdrop-filter: blur(6px); transition: background 0.2s; }
    .logout-btn:hover { background: rgba(255,255,255,0.95); }

    /* Entry section */
    .entry-section { position: relative; z-index: 1; max-width: 580px; margin: 1.2rem auto 1.8rem; padding: 0 1.2rem; }
    .entry-card { background: rgba(255,255,255,0.88); backdrop-filter: blur(12px); border-radius: 22px; padding: 1.8rem; box-shadow: 0 8px 32px rgba(0,80,0,0.14); border: 1.5px solid rgba(255,255,255,0.7); }
    .entry-card h2 { font-size: 1.12rem; color: #1b4d1b; margin-bottom: 0.35rem; }
    .date-display  { font-size: 0.8rem; color: #7a9a7a; margin-bottom: 0.9rem; }

    textarea {
      width: 100%; height: 118px; padding: 0.9rem 1rem;
      border: 2px solid #c8e6c9; border-radius: 13px;
      font-size: 0.97rem; font-family: inherit; resize: vertical;
      background: rgba(255,255,255,0.95); color: #1a3a1a;
      outline: none; transition: border-color 0.25s, box-shadow 0.25s;
    }
    textarea:focus { border-color: #4caf50; box-shadow: 0 0 0 3px rgba(76,175,80,0.18); }
    textarea::placeholder { color: #b0c4b0; }
    .char-count { text-align: right; font-size: 0.74rem; color: #aaa; margin-top: 0.22rem; }

    /* Per-entry plant type picker */
    .plant-pick-label { font-size: 0.82rem; color: #3d6b3d; font-weight: 600; margin: 0.9rem 0 0.45rem; }
    .plant-pick-row   { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .plant-pick-opt {
      display: flex; align-items: center; gap: 0.35rem;
      padding: 0.38rem 0.85rem;
      border: 2px solid #c8e6c9; border-radius: 20px;
      cursor: pointer; font-size: 0.88rem; color: #3d6b3d;
      transition: border-color 0.18s, background 0.18s, transform 0.15s;
      user-select: none;
    }
    .plant-pick-opt:hover { background: #f1f8e9; transform: translateY(-1px); }
    .plant-pick-opt.selected { border-color: #43a047; background: #e8f5e9; font-weight: 600; color: #1b5e20; }
    .plant-pick-opt .ppo-emoji { font-size: 1.15rem; line-height: 1; }

    .submit-btn {
      width: 100%; margin-top: 1rem; padding: 0.88rem;
      background: linear-gradient(135deg, #43a047, #1b5e20); color: #fff;
      border: none; border-radius: 13px; font-size: 1.05rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: transform 0.2s, box-shadow 0.2s;
    }
    .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(27,94,32,0.38); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .already-done { text-align: center; padding: 1.8rem 1rem; }
    .already-done .big-emoji { font-size: 3.5rem; margin-bottom: 0.6rem; }
    .already-done h2 { color: #1b4d1b; margin-bottom: 0.4rem; font-size: 1.08rem; }
    .already-done p  { color: #5a8a5a; font-size: 0.9rem; }

    .msg { margin-top: 0.7rem; padding: 0.72rem 1rem; border-radius: 10px; font-size: 0.87rem; text-align: center; }
    .msg.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .msg.error   { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }

    /* Garden */
    .garden-section { position: relative; z-index: 1; padding: 0 1.2rem 4rem; }
    .garden-header  { text-align: center; margin-bottom: 1.1rem; }
    .garden-header h2 { font-size: 1.4rem; color: #1b4d1b; font-weight: 600; }
    .garden-stats     { font-size: 0.86rem; color: #4a7a4a; margin-top: 0.25rem; }

    .garden-wrap   { max-width: 900px; margin: 0 auto; border-radius: 26px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,80,0,0.18); }
    .garden-sky    { background: linear-gradient(180deg, #87ceeb 0%, #c8ecf8 100%); height: 38px; }
    .garden-ground { background: linear-gradient(180deg, #a5d6a7 0%, #81c784 40%, #66bb6a 100%); padding: 1.8rem 1.5rem 1.5rem; border-top: 3px solid #4caf50; min-height: 180px; }
    .garden-soil   { background: linear-gradient(180deg, #5d4037 0%, #4e342e 100%); height: 18px; }

    .plants-grid { display: flex; flex-wrap: wrap; gap: 0.9rem 1.1rem; align-items: flex-end; }
    .plant-item  { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.25s; user-select: none; }
    .plant-item:hover { transform: scale(1.18) translateY(-5px); }
    .plant-emoji { line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.18)); animation: sway 3.5s ease-in-out infinite; }
    .plant-item:nth-child(even) .plant-emoji { animation-delay: -1.75s; }
    .plant-item:nth-child(3n)   .plant-emoji { animation-delay: -2.8s; }
    .plant-item:nth-child(5n)   .plant-emoji { animation-delay: -0.9s; }
    @keyframes sway { 0%,100% { transform: rotate(-4deg); } 50% { transform: rotate(4deg); } }
    .plant-date { font-size: 0.61rem; color: #2e5d2e; margin-top: 0.22rem; font-weight: 600; }

    .empty-garden { text-align: center; padding: 2.5rem 1rem; color: #3d7a3d; width: 100%; }
    .empty-garden .e-emoji { font-size: 3.5rem; margin-bottom: 0.6rem; }
    .empty-garden p { font-size: 0.94rem; }

    .legend { max-width: 900px; margin: 1.1rem auto 0; display: flex; flex-wrap: wrap; gap: 0.45rem; justify-content: center; }
    .legend-item { font-size: 0.77rem; color: #3d6b3d; background: rgba(255,255,255,0.62); padding: 0.26rem 0.72rem; border-radius: 20px; backdrop-filter: blur(4px); }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,30,0,0.55); backdrop-filter: blur(5px);
      z-index: 200; justify-content: center; align-items: center; padding: 1rem;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff; border-radius: 24px; padding: 2rem;
      max-width: 450px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.28);
      animation: modalIn 0.26s ease;
    }
    @keyframes modalIn { from { transform: scale(0.82); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-plant { text-align: center; font-size: 4.5rem; margin-bottom: 0.4rem; }
    .modal-date  { text-align: center; font-size: 0.87rem; color: #888; margin-bottom: 0.25rem; }
    .modal-stage { text-align: center; font-size: 0.77rem; color: #4caf50; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 1.1rem; }
    .modal-text  {
      background: #f1f8e9; border-left: 4px solid #66bb6a; border-radius: 12px;
      padding: 1.1rem 1.2rem; font-size: 0.97rem; line-height: 1.65;
      color: #1a3a1a; margin-bottom: 1.4rem; white-space: pre-wrap;
    }
    .modal-close { width: 100%; padding: 0.76rem; background: #f5f5f5; border: none; border-radius: 12px; font-size: 0.94rem; cursor: pointer; font-family: inherit; color: #555; transition: background 0.2s; }
    .modal-close:hover { background: #e0e0e0; }

    @keyframes popIn {
      0%   { transform: scale(0) translateY(20px); opacity: 0; }
      70%  { transform: scale(1.15) translateY(-4px); }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .plant-item.new-plant .plant-emoji { animation: popIn 0.5s ease forwards, sway 3.5s ease-in-out 0.5s infinite; }

    @media (max-width: 480px) {
      .journal-header { flex-direction: column; align-items: flex-start; gap: 0.6rem; }
      .plant-emoji { font-size: 1.9rem !important; }
    }
  </style>
</head>
<body>

  <div class="sun">☀️</div>
  <div class="clouds">
    <div class="cloud">☁️</div>
    <div class="cloud">☁️</div>
    <div class="cloud">☁️</div>
  </div>

  <!-- ══ AUTH VIEW ══ -->
  <div id="authView" class="view">
    <div class="auth-wrap">
      <div class="auth-title">
        <h1>🌿 Талархлын Цэцэрлэг</h1>
        <p>Өдөр бүр нэг талархал — өдөр бүр нэг ургамал</p>
      </div>
      <div class="auth-card">
        <div class="auth-tabs">
          <button class="tab-btn active" id="tabLogin"    onclick="switchTab('login')">Нэвтрэх</button>
          <button class="tab-btn"        id="tabRegister" onclick="switchTab('register')">Бүртгүүлэх</button>
        </div>

        <!-- Login -->
        <div id="loginForm">
          <div class="field"><label>Нэр</label><input type="text" id="loginName" placeholder="Таны нэр" autocomplete="username" /></div>
          <div class="field"><label>Нууц үг</label><input type="password" id="loginPass" placeholder="Нууц үг" autocomplete="current-password" /></div>
          <button class="auth-btn" id="loginBtn" onclick="doLogin()">🌱 Нэвтрэх</button>
          <div id="loginMsg"></div>
        </div>

        <!-- Register -->
        <div id="registerForm" style="display:none">
          <div class="field"><label>Нэр</label><input type="text" id="regName" placeholder="Таны нэр" autocomplete="username" /></div>
          <div class="field"><label>Нууц үг <span style="font-weight:400;color:#aaa">(хамгийн багадаа 6 тэмдэгт)</span></label><input type="password" id="regPass" placeholder="Нууц үг" autocomplete="new-password" /></div>
          <div class="field"><label>Цэцэрлэгийн нэр <span style="font-weight:400;color:#aaa">(заавал биш)</span></label><input type="text" id="regGarden" placeholder="жишээ нь: Батын Цэцэрлэг" maxlength="40" /></div>
          <button class="auth-btn" id="regBtn" onclick="doRegister()">🌱 Цэцэрлэг үүсгэх</button>
          <div id="regMsg"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ JOURNAL VIEW ══ -->
  <div id="journalView" class="view">

    <div class="journal-header">
      <div class="journal-header-left">
        <h1 id="gardenTitle">🌿 Миний Цэцэрлэг</h1>
        <div class="garden-owner" id="gardenOwner"></div>
      </div>
      <div class="journal-header-right">
        <div id="streakDisplay"></div>
        <button class="logout-btn" onclick="doLogout()">Гарах</button>
      </div>
    </div>

    <!-- Entry card -->
    <div class="entry-section">
      <div class="entry-card" id="entryCard">
        <h2>🌱 Өнөөдрийн талархал</h2>
        <div class="date-display" id="dateDisplay"></div>
        <textarea id="entryText" maxlength="1000"
          placeholder="Өнөөдөр юунд талархаж байна вэ? Ямар нэгэн зүйл, хүн, эсвэл мэдрэмжийн талаар бичнэ үү..."></textarea>
        <div class="char-count"><span id="charCount">0</span> / 1000</div>

        <div class="plant-pick-label">Юу тарих вэ?</div>
        <div class="plant-pick-row" id="plantPickRow">
          <div class="plant-pick-opt selected" data-type="flower"    onclick="pickPlant(this)"><span class="ppo-emoji">🌺</span> Цэцэг</div>
          <div class="plant-pick-opt"          data-type="fruit"     onclick="pickPlant(this)"><span class="ppo-emoji">🍎</span> Жимс</div>
          <div class="plant-pick-opt"          data-type="tree"      onclick="pickPlant(this)"><span class="ppo-emoji">🌳</span> Мод</div>
          <div class="plant-pick-opt"          data-type="vegetable" onclick="pickPlant(this)"><span class="ppo-emoji">🥦</span> Ногоо</div>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="submitEntry()">🌱 Цэцэрлэгт тариах</button>
        <div id="msgEl"></div>
      </div>
    </div>

    <!-- Garden -->
    <div class="garden-section">
      <div class="garden-header">
        <h2 id="gardenSectionTitle">🌺 Цэцэрлэг</h2>
        <div class="garden-stats" id="gardenStats"></div>
      </div>
      <div class="garden-wrap">
        <div class="garden-sky"></div>
        <div class="garden-ground">
          <div class="plants-grid" id="plantsGrid">
            <div class="empty-garden" id="emptyGarden">
              <div class="e-emoji">🌰</div>
              <p>Цэцэрлэг хоосон байна.<br>Эхний талархлаа тариарай!</p>
            </div>
          </div>
        </div>
        <div class="garden-soil"></div>
      </div>
      <div class="legend" id="legend"></div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-plant" id="mPlant"></div>
      <div class="modal-date"  id="mDate"></div>
      <div class="modal-stage" id="mStage"></div>
      <div class="modal-text"  id="mText"></div>
      <button class="modal-close" onclick="closeModal()">Хаах</button>
    </div>
  </div>

  <script>
    /* ── Data ── */
    const PLANT_EMOJIS = {
      flower:    ['🌰','🌱','🌷','🌸','🌺'],
      fruit:     ['🌰','🌱','🌿','🍇','🍎'],
      tree:      ['🌰','🌱','🌿','🌲','🌳'],
      vegetable: ['🌰','🌱','🌿','🥬','🥦'],
    };
    const PLANT_MATURE = { flower:'🌺', fruit:'🍎', tree:'🌳', vegetable:'🥦' };
    const PLANT_NAMES  = { flower:'Цэцэг', fruit:'Жимс', tree:'Мод', vegetable:'Ногоо' };
    const STAGE_LABELS = ['Үр','Мөлхүүр','Ургаж байна','Цэцэглэж байна','Бүрэн ургасан'];
    const STAGE_DAYS   = ['Өнөөдөр','1 хоног','2–3 хоног','4–5 хоног','6+ хоног'];
    const STAGE_SIZES  = ['1.8rem','2.1rem','2.5rem','2.8rem','3.2rem'];
    const MONTHS = ['1-р сар','2-р сар','3-р сар','4-р сар','5-р сар','6-р сар','7-р сар','8-р сар','9-р сар','10-р сар','11-р сар','12-р сар'];

    let currentUser     = null;
    let selectedPlant   = 'flower'; // chosen in entry form

    /* ── Utils ── */
    function fmtLong(ds) {
      const d = new Date(ds + 'T00:00:00');
      return `${d.getFullYear()} оны ${MONTHS[d.getMonth()]} ${d.getDate()}`;
    }
    function fmtShort(ds) {
      const d = new Date(ds + 'T00:00:00'); return `${d.getMonth()+1}/${d.getDate()}`;
    }
    function emojiForEntry(entry) {
      return (PLANT_EMOJIS[entry.plant_type] || PLANT_EMOJIS.flower)[entry.stage];
    }

    /* ── Auth tabs ── */
    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabRegister').classList.toggle('active', !isLogin);
      document.getElementById('loginForm').style.display    = isLogin ? '' : 'none';
      document.getElementById('registerForm').style.display = isLogin ? 'none' : '';
    }

    /* ── Plant picker in entry form ── */
    function pickPlant(el) {
      document.querySelectorAll('.plant-pick-opt').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      selectedPlant = el.dataset.type;
    }

    /* ── Views ── */
    function showAuth()    { document.getElementById('authView').classList.add('active');    document.getElementById('journalView').classList.remove('active'); }
    function showJournal() { document.getElementById('authView').classList.remove('active'); document.getElementById('journalView').classList.add('active'); }

    function onLogin(user) {
      currentUser = user;
      document.getElementById('gardenTitle').textContent        = `🌿 ${user.garden_name}`;
      document.getElementById('gardenSectionTitle').textContent = `🌺 ${user.garden_name}`;
      document.getElementById('gardenOwner').textContent        = `${user.name}-ийн цэцэрлэг`;
      setDateDisplay();
      showJournal();
      checkToday();
      loadGarden();
    }

    function setDateDisplay() {
      const now = new Date();
      document.getElementById('dateDisplay').textContent =
        `${now.getFullYear()} оны ${MONTHS[now.getMonth()]} ${now.getDate()}`;
    }

    /* ── Auth actions ── */
    async function doLogin() {
      const name = document.getElementById('loginName').value.trim();
      const pass = document.getElementById('loginPass').value.trim();
      const btn  = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = '⏳...';
      try {
        const res  = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name, password: pass }) });
        const data = await res.json();
        if (res.ok) onLogin(data);
        else showAuthMsg('loginMsg', data.error, 'error');
      } catch { showAuthMsg('loginMsg', 'Холболтын алдаа гарлаа.', 'error'); }
      btn.disabled = false; btn.textContent = '🌱 Нэвтрэх';
    }

    async function doRegister() {
      const name        = document.getElementById('regName').value.trim();
      const pass        = document.getElementById('regPass').value.trim();
      const garden_name = document.getElementById('regGarden').value.trim();
      const btn         = document.getElementById('regBtn');
      btn.disabled = true; btn.textContent = '⏳...';
      try {
        const res  = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name, password: pass, garden_name }) });
        const data = await res.json();
        if (res.ok) onLogin(data);
        else showAuthMsg('regMsg', data.error, 'error');
      } catch { showAuthMsg('regMsg', 'Холболтын алдаа гарлаа.', 'error'); }
      btn.disabled = false; btn.textContent = '🌱 Цэцэрлэг үүсгэх';
    }

    async function doLogout() {
      await fetch('/api/logout', { method: 'POST' });
      currentUser = null;
      document.getElementById('streakDisplay').innerHTML = '';
      resetEntryCard();
      showAuth();
    }

    function resetEntryCard() {
      document.getElementById('entryCard').innerHTML = `
        <h2>🌱 Өнөөдрийн талархал</h2>
        <div class="date-display" id="dateDisplay"></div>
        <textarea id="entryText" maxlength="1000" placeholder="Өнөөдөр юунд талархаж байна вэ?..."></textarea>
        <div class="char-count"><span id="charCount">0</span> / 1000</div>
        <div class="plant-pick-label">Юу тарих вэ?</div>
        <div class="plant-pick-row" id="plantPickRow">
          <div class="plant-pick-opt selected" data-type="flower"    onclick="pickPlant(this)"><span class="ppo-emoji">🌺</span> Цэцэг</div>
          <div class="plant-pick-opt"          data-type="fruit"     onclick="pickPlant(this)"><span class="ppo-emoji">🍎</span> Жимс</div>
          <div class="plant-pick-opt"          data-type="tree"      onclick="pickPlant(this)"><span class="ppo-emoji">🌳</span> Мод</div>
          <div class="plant-pick-opt"          data-type="vegetable" onclick="pickPlant(this)"><span class="ppo-emoji">🥦</span> Ногоо</div>
        </div>
        <button class="submit-btn" id="submitBtn" onclick="submitEntry()">🌱 Цэцэрлэгт тариах</button>
        <div id="msgEl"></div>`;
      selectedPlant = 'flower';
      document.getElementById('entryText').addEventListener('input', () => {
        document.getElementById('charCount').textContent = document.getElementById('entryText').value.length;
      });
    }

    function showAuthMsg(id, text, type) {
      const el = document.getElementById(id); el.className = 'msg ' + type; el.textContent = text;
    }

    /* ── Enter to submit in auth forms ── */
    ['loginName','loginPass'].forEach(id => {
      document.getElementById(id)?.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    });

    /* ── Entry ── */
    document.getElementById('entryText')?.addEventListener('input', function () {
      document.getElementById('charCount').textContent = this.value.length;
    });

    async function submitEntry() {
      const content = document.getElementById('entryText').value.trim();
      const btn     = document.getElementById('submitBtn');
      if (!content) { showMsg('Талархлаа бичнэ үү 🌱', 'error'); return; }

      btn.disabled = true; btn.textContent = '⏳ Тариаж байна...';
      try {
        const res  = await fetch('/api/entry', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ content, plant_type: selectedPlant }),
        });
        const data = await res.json();
        if (res.ok) {
          showMsg(data.message, 'success');
          const plantedType = selectedPlant;
          setTimeout(() => { renderDone(plantedType); loadGarden(); }, 1400);
        } else {
          showMsg(data.error, 'error');
          btn.disabled = false; btn.textContent = '🌱 Цэцэрлэгт тариах';
        }
      } catch {
        showMsg('Холболтын алдаа гарлаа.', 'error');
        btn.disabled = false; btn.textContent = '🌱 Цэцэрлэгт тариах';
      }
    }

    function showMsg(text, type) {
      const el = document.getElementById('msgEl'); el.className = 'msg ' + type; el.textContent = text;
    }

    function renderDone(plantType) {
      const mature = PLANT_MATURE[plantType] || '🌿';
      const name   = PLANT_NAMES[plantType]  || '';
      document.getElementById('entryCard').innerHTML = `
        <div class="already-done">
          <div class="big-emoji">${mature}</div>
          <h2>Өнөөдрийн цэцгээ тарилаа, сайн байна!</h2>
          <p>${name} тарьлаа. Маргааш дахин ирж, цэцэрлэгээ улам гоё ургуулаарай 🌸</p>
        </div>`;
    }

    async function checkToday() {
      try {
        const res  = await fetch('/api/today');
        if (res.status === 401) { showAuth(); return; }
        const data = await res.json();
        if (data.has_entry) renderDone(data.plant_type || 'flower');
      } catch {}
    }

    /* ── Garden ── */
    async function loadGarden() {
      try {
        const res     = await fetch('/api/entries');
        if (res.status === 401) { showAuth(); return; }
        const entries = await res.json();

        const grid  = document.getElementById('plantsGrid');
        const empty = document.getElementById('emptyGarden');

        if (!entries.length) { if (empty) empty.style.display = 'block'; return; }
        if (empty) empty.style.display = 'none';
        grid.innerHTML = '';

        entries.forEach((entry, i) => {
          const emoji = emojiForEntry(entry);
          const size  = STAGE_SIZES[entry.stage];
          const item  = document.createElement('div');
          item.className = 'plant-item' + (entry.days_ago === 0 ? ' new-plant' : '');
          item.style.marginBottom = Math.max(0, ((i * 17 + 5) % 18) - 9) + 'px';
          item.innerHTML = `
            <div class="plant-emoji" style="font-size:${size}">${emoji}</div>
            <div class="plant-date">${fmtShort(entry.entry_date)}</div>`;
          item.addEventListener('click', () => openModal(entry));
          grid.appendChild(item);
        });

        document.getElementById('gardenStats').textContent = `${entries.length} ургамал цэцэрлэгт байна`;

        // Streak
        const streak = calcStreak(entries);
        document.getElementById('streakDisplay').innerHTML =
          streak > 1 ? `<span class="streak-badge">🔥 ${streak} өдрийн дараалал</span>` : '';

        // Dynamic legend: unique plant types present
        buildLegend(entries);
      } catch {}
    }

    function buildLegend(entries) {
      const types  = [...new Set(entries.map(e => e.plant_type))];
      const legend = document.getElementById('legend');
      const items  = types.map(t => {
        const emojis = PLANT_EMOJIS[t] || PLANT_EMOJIS.flower;
        return STAGE_DAYS.map((day, i) => `<div class="legend-item">${emojis[i]} ${day}</div>`).join('');
      });
      // If single type, show all 5 stages; if multiple types, just show mature emoji + name
      if (types.length === 1) {
        legend.innerHTML = items[0];
      } else {
        legend.innerHTML = types.map(t =>
          `<div class="legend-item">${PLANT_MATURE[t]} ${PLANT_NAMES[t]}</div>`
        ).join('');
      }
    }

    function calcStreak(entries) {
      const dateSet = new Set(entries.map(e => e.entry_date));
      const today   = new Date(); today.setHours(0,0,0,0);
      let streak = 0; const cur = new Date(today);
      while (true) {
        const key = cur.toISOString().split('T')[0];
        if (!dateSet.has(key)) break;
        streak++; cur.setDate(cur.getDate() - 1);
      }
      return streak;
    }

    /* ── Modal ── */
    function openModal(entry) {
      const emoji = emojiForEntry(entry);
      document.getElementById('mPlant').textContent = emoji;
      document.getElementById('mDate').textContent  = fmtLong(entry.entry_date);
      document.getElementById('mStage').textContent =
        entry.days_ago === 0
          ? `Өнөөдөр тарьсан · ${PLANT_NAMES[entry.plant_type] || ''}`
          : `${entry.days_ago} хоногийн өмнө · ${STAGE_LABELS[entry.stage]} · ${PLANT_NAMES[entry.plant_type] || ''}`;
      document.getElementById('mText').textContent = entry.content;
      document.getElementById('modalOverlay').classList.add('active');
    }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
    function handleOverlayClick(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    /* ── Boot ── */
    (async () => {
      try {
        const res  = await fetch('/api/me');
        const data = await res.json();
        if (data.logged_in) onLogin(data);
        else showAuth();
      } catch { showAuth(); }
    })();
  </script>
</body>
</html>
